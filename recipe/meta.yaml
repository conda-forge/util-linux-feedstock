{% set version = "2.41.3" %}
{% set major_minor = '.'.join(version.split('.')[:2]) %}

package:
  name: util-linux
  version: {{ version }}

source:
  url: https://mirrors.edge.kernel.org/pub/linux/utils/util-linux/v{{ major_minor }}/util-linux-{{ version }}.tar.xz
  sha256: 3330d873f0fceb5560b89a7dc14e4f3288bbd880e96903ed9b50ec2b5799e58b
  patches:
    # While this has been added to the main branch
    # It hasn't been added to any released branch
    # https://github.com/util-linux/util-linux/pull/3554
    - 3554-osx-bits-detection.patch

build:
  number: 0
  skip: true  # [not unix]
  run_exports:
    - {{ pin_subpackage('util-linux', max_pin='x.x') }}

requirements:
  build:
    - python                                 # [build_platform != target_platform]
    - cross-python_{{ target_platform }}     # [build_platform != target_platform]
    - gnuconfig  # [unix]
    - {{ compiler('c') }}
    - {{ stdlib('c') }}
    - make
    - libtool
    - autoconf
    - automake
    - gettext-tools
    - pkg-config
  host:
    - python
    - zlib
    - ncurses
    - readline
    - libuuid {{ version }}
    - libxcrypt  # [linux]
  run:
    - python
    - libuuid {{ version }}

test:
  commands:
    - test -f "${PREFIX}/lib/libmount.so"  # [linux]
    - test -f "${PREFIX}/bin/hexdump"

about:
  home: https://en.wikipedia.org/wiki/Util-linux
  license: LGPL-2.0-or-later
  license_family: GPL
  license_file: COPYING
  summary: A random collection of Linux utilities
  dev_url: https://github.com/util-linux/util-linux

extra:
  recipe-maintainers:
    - jaimergp
    - scopatz
    - hmaarrfk
